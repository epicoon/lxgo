name: create_tables
type: query

up:
  - CREATE TABLE
    roles (
      id SERIAL PRIMARY KEY,
      name VARCHAR(255) NOT NULL
    )
  - CREATE INDEX roles_name_idx ON roles (name);

  - CREATE TABLE
    rights (
      id SERIAL PRIMARY KEY,
      name VARCHAR(255) NOT NULL,
      role_id INT NOT NULL,
      CONSTRAINT fk_rights_role_id
        FOREIGN KEY(role_id)
        REFERENCES roles(id)
        ON DELETE CASCADE
    );
  - CREATE INDEX rights_name_idx ON rights (name);
  - CREATE INDEX rights_role_id_idx ON rights (role_id);

  - CREATE TABLE
    clients (
      id SERIAL PRIMARY KEY,
      secret VARCHAR(255),
      access_token_lifetime INT NOT NULL DEFAULT 900,
      refresh_token_lifetime INT NOT NULL DEFAULT 604800,
      redirect_uri VARCHAR(255),
      created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      deleted_at TIMESTAMP
    )
  - CREATE INDEX clients_secret_idx ON clients (secret);

  - CREATE TABLE
    users (
      id SERIAL PRIMARY KEY,
      login VARCHAR(255) NOT NULL UNIQUE,
      password VARCHAR(255) NOT NULL,
      name VARCHAR(255),
      phone VARCHAR(50),
      email VARCHAR(255),
      created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      deleted_at TIMESTAMP
     );
  - CREATE INDEX users_login_idx ON users (login);
  - CREATE INDEX users_password_idx ON users (password);

  - CREATE TABLE
    admins (
      id SERIAL PRIMARY KEY,
      user_id INT NOT NULL,
      role_id INT NOT NULL,
      created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      deleted_at TIMESTAMP,
      CONSTRAINT fk_admins_user_id
        FOREIGN KEY(user_id)
        REFERENCES users(id)
        ON DELETE CASCADE,
      CONSTRAINT fk_admins_role_id
        FOREIGN KEY(role_id)
        REFERENCES roles(id)
        ON DELETE RESTRICT
    );
  - CREATE INDEX admins_role_id_idx ON admins (role_id);
  - CREATE UNIQUE INDEX admins_user_id_idx ON admins (user_id) WHERE deleted_at IS NULL;

  - CREATE TABLE
    user_data (
      id SERIAL PRIMARY KEY,
      client_id INT NOT NULL,
      user_id INT NOT NULL,
      data JSONB,
      created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      deleted_at TIMESTAMP,
      CONSTRAINT fk_user_data_client_id
        FOREIGN KEY(client_id)
        REFERENCES clients(id)
        ON DELETE CASCADE,
      CONSTRAINT fk_user_data_user_id
        FOREIGN KEY(user_id)
        REFERENCES users(id)
        ON DELETE CASCADE
    );
  - CREATE INDEX user_data_client_id_idx ON user_data (client_id);
  - CREATE INDEX user_data_user_id_idx ON user_data (user_id);
  - CREATE UNIQUE INDEX user_data_client_user_idx ON user_data (client_id, user_id) WHERE deleted_at IS NULL;

  - CREATE TABLE
    codes (
      id SERIAL PRIMARY KEY,
      value VARCHAR(255) NOT NULL,
      client_id INT NOT NULL,
      user_id INT NOT NULL,
      scope VARCHAR(50) NOT NULL DEFAULT 'profile',
      CONSTRAINT fk_codes_client_id
        FOREIGN KEY(client_id)
        REFERENCES clients(id)
        ON DELETE CASCADE,
      CONSTRAINT fk_codes_user_id
        FOREIGN KEY(user_id)
        REFERENCES users(id)
        ON DELETE CASCADE
    );
  - CREATE INDEX codes_value_idx ON codes (value);
  - CREATE INDEX codes_client_id_idx ON codes (client_id);
  - CREATE INDEX codes_user_id_idx ON codes (user_id);

  - CREATE TABLE
    tokens (
      id SERIAL PRIMARY KEY,
      client_id INT NOT NULL,
      user_id INT NOT NULL,
      value VARCHAR(255) NOT NULL,
      scope VARCHAR(50) NOT NULL DEFAULT 'profile',
      is_refresh BOOLEAN NOT NULL,
      expired_at TIMESTAMP NOT NULL,
      created_at TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP,
      CONSTRAINT fk_tokens_client_id
        FOREIGN KEY(client_id)
        REFERENCES clients(id)
        ON DELETE CASCADE,
      CONSTRAINT fk_tokens_user_id
        FOREIGN KEY(user_id)
        REFERENCES users(id)
        ON DELETE CASCADE
    );
  - CREATE INDEX tokens_value_idx ON tokens (value);
  - CREATE INDEX tokens_client_id_idx ON tokens (client_id);
  - CREATE INDEX tokens_user_id_idx ON tokens (user_id);

